<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Received — ZTEX Construction</title>
    <meta name="description" content="Your sponsorship request has been received. ZTEX Construction will follow up within 5-7 business days.">
    <link rel="icon" type="image/png" href="assets/images/ztex-star.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .thanks-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .thanks-page::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(196, 30, 58, 0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(212, 175, 55, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .thanks-card {
            max-width: 620px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: thanksIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes thanksIn {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .thanks-icon {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(196, 30, 58, 0.12), rgba(212, 175, 55, 0.12));
            border: 1.5px solid rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
        }

        .thanks-icon svg {
            color: #D4AF37;
            animation: checkDraw 0.6s 0.4s ease both;
        }

        @keyframes checkDraw {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        .thanks-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #D4AF37;
            margin-bottom: 1.25rem;
        }

        .thanks-tag::before,
        .thanks-tag::after {
            content: '';
            display: block;
            width: 32px;
            height: 1px;
            background: #D4AF37;
            opacity: 0.5;
        }

        .thanks-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: #F5F0E8;
            line-height: 1.15;
            margin-bottom: 1.25rem;
        }

        .thanks-title em {
            font-style: italic;
            color: #D4AF37;
        }

        .thanks-body {
            font-family: 'Inter', sans-serif;
            font-size: 1.0625rem;
            color: rgba(245, 240, 232, 0.65);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .thanks-divider {
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, #C41E3A, #D4AF37);
            margin: 0 auto 2.5rem;
            border-radius: 2px;
        }

        .thanks-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .thanks-btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: linear-gradient(135deg, #C41E3A, #A01830);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-decoration: none;
            border-radius: 4px;
            transition: opacity 0.2s, transform 0.2s;
        }

        .thanks-btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .thanks-btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: transparent;
            color: rgba(245, 240, 232, 0.7);
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-decoration: none;
            border: 1px solid rgba(245, 240, 232, 0.2);
            border-radius: 4px;
            transition: border-color 0.2s, color 0.2s, transform 0.2s;
        }

        .thanks-btn-secondary:hover {
            border-color: rgba(212, 175, 55, 0.5);
            color: #D4AF37;
            transform: translateY(-1px);
        }

        .thanks-logo {
            margin-bottom: 3rem;
            opacity: 0.85;
        }

        .thanks-logo img {
            height: 40px;
            width: auto;
        }

        .thanks-footer {
            margin-top: 3rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            color: rgba(245, 240, 232, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="particles" class="particles-canvas"></canvas>

    <main class="thanks-page">
        <div class="thanks-card">

            <div class="thanks-logo">
                <a href="https://www.ztexconstruction.com" target="_blank" rel="noopener">
                    <img src="assets/images/ztex-logo-main.png" alt="ZTEX Construction">
                </a>
            </div>

            <div class="thanks-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <div class="thanks-tag">Request Received</div>

            <h1 class="thanks-title">
                Thank You for<br><em>Reaching Out</em>
            </h1>

            <div class="thanks-divider"></div>

            <p class="thanks-body">
                Your sponsorship request has been submitted successfully. Our team will review your application and follow up with you within <strong style="color: rgba(245,240,232,0.85);">5–7 business days</strong>.
            </p>

            <div class="thanks-actions">
                <a href="/" class="thanks-btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 5 5 12 12 19"></polyline></svg>
                    Back to Home
                </a>
                <a href="https://www.ztexconstruction.com" class="thanks-btn-secondary" target="_blank" rel="noopener">
                    Visit ZTEX Construction
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                </a>
            </div>

            <p class="thanks-footer">© 2025 ZTEX Construction, Inc. — A Partner To Be Relied Upon.</p>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
